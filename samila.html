<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=0.25, user-scalable=yes, minimum-scale=0.1, maximum-scale=5.0">
<title>AVC Beach Tour 25th Samila Open 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0D1B2A;--bg2:#1A2D42;
  --teal:#2EC4B6;--teal-d:#1A8C85;
  --gold:#F0A500;--gold-l:#FFD166;
  --purple:#C86DD7;--purple-d:#7B2D8B;
  --white:#FFFFFF;--gray:#8A9BB0;--gray-l:#E8EDF2;--text:#1A2D42;
  --card-h:106px;--gap:8px;--slot:calc(var(--card-h) + var(--gap));
}
body{font-family:'Barlow',sans-serif;background:var(--bg);background-image:radial-gradient(ellipse at 15% 25%,rgba(46,196,182,0.08) 0%,transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(240,165,0,0.06) 0%,transparent 55%);min-height:100vh;color:var(--text);padding:20px 16px 60px;}

/* HEADER */
.hd{text-align:center;margin-bottom:20px;}
.hd-meta{display:flex;justify-content:center;gap:10px;margin-top:8px;flex-wrap:wrap;}
.hd-tag{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.88);font-size:10px;letter-spacing:2px;padding:3px 12px;border-radius:3px;font-weight:600;text-transform:uppercase;}
.hd-tag.jpn{border-color:var(--teal);color:var(--teal);background:rgba(46,196,182,0.1);}

/* GENDER TOGGLE */
.toggle-wrap{display:flex;justify-content:center;gap:10px;margin-bottom:16px;}
.toggle-btn{font-family:'Barlow Condensed',cursive;font-size:16px;letter-spacing:3px;padding:8px 32px;border-radius:3px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.80);cursor:pointer;transition:all 0.2s;text-transform:uppercase;font-weight:700;}
.toggle-btn.active{background:var(--teal-d);border-color:var(--teal);color:#fff;box-shadow:0 2px 16px rgba(46,196,182,0.3);}
.toggle-btn.women-btn.active{background:var(--purple-d);border-color:var(--purple);color:#fff;box-shadow:0 2px 16px rgba(200,109,215,0.3);}

/* SUB TABS */
.sub-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:20px;}
.sub-tab{font-family:'Barlow Condensed',cursive;font-size:14px;letter-spacing:2px;padding:6px 24px;border-radius:3px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.80);cursor:pointer;transition:all 0.2s;text-transform:uppercase;font-weight:700;}
.sub-tab.active{background:rgba(46,196,182,0.2);border-color:var(--teal);color:var(--teal);}
.women-mode .sub-tab.active{background:rgba(200,109,215,0.2);border-color:var(--purple);color:var(--purple);}

/* VIEW */
.view{display:none;}.view.active{display:block;}
.sub-view{display:none;}.sub-view.active{display:block;}

/* POOL PLAY */
.pools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:24px;}
.pool-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;overflow:hidden;}
.pool-title{font-family:'Barlow Condensed',cursive;font-size:14px;letter-spacing:3px;font-weight:700;text-transform:uppercase;padding:8px 14px;background:rgba(46,196,182,0.15);color:var(--teal);border-bottom:1px solid rgba(46,196,182,0.2);}
.women-mode .pool-title{background:rgba(200,109,215,0.15);color:var(--purple);border-bottom-color:rgba(200,109,215,0.2);}
.pool-table{width:100%;border-collapse:collapse;font-size:11px;}
.pool-table th{padding:5px 8px;text-align:center;color:var(--gray);font-weight:600;font-size:9px;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,0.08);text-transform:uppercase;}
.pool-table th:first-child,.pool-table th:nth-child(2){text-align:left;}
.pool-table td{padding:6px 8px;text-align:center;color:rgba(255,255,255,0.88);border-bottom:1px solid rgba(255,255,255,0.06);}
.pool-table td:nth-child(2){text-align:left;}
.pool-table tr:last-child td{border-bottom:none;}
.pool-table tr.adv td{color:#fff;}
.rank-num{font-family:'Barlow Condensed',cursive;font-weight:700;font-size:13px;color:var(--gray);width:20px;}
.pool-table tr.adv .rank-num{color:var(--teal);}
.women-mode .pool-table tr.adv .rank-num{color:var(--purple);}
.ctry-pill{display:inline-block;font-size:8px;font-weight:700;color:#fff;background:var(--bg2);border-radius:2px;padding:1px 4px;margin-right:4px;}
.ctry-pill.jpn{background:var(--teal-d);}
.women-mode .ctry-pill.jpn{background:var(--purple-d);}
.adv-badge{font-size:8px;font-weight:700;color:var(--teal);margin-left:4px;}
.women-mode .adv-badge{color:var(--purple);}
.matches-section{margin-top:20px;}
.matches-title{font-family:'Barlow Condensed',cursive;font-size:13px;letter-spacing:3px;font-weight:700;text-transform:uppercase;color:rgba(255,255,255,0.80);margin-bottom:10px;}
.mr-list{display:flex;flex-direction:column;gap:5px;}
.mr-row{display:flex;align-items:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:5px;padding:6px 12px;gap:8px;font-size:11px;}
.mr-pool{font-family:'Barlow Condensed',cursive;font-size:10px;font-weight:700;color:var(--teal);width:24px;flex-shrink:0;}
.women-mode .mr-pool{color:var(--purple);}
.mr-date{font-size:9px;color:var(--gray);width:42px;flex-shrink:0;}
.mr-team{flex:1;display:flex;align-items:center;gap:4px;}
.mr-team.winner span.mr-name{font-weight:700;color:#fff;}
.mr-team.loser span.mr-name{color:var(--gray);}
.mr-vs{font-size:9px;color:var(--gray);flex-shrink:0;}
.mr-score{font-size:10px;font-weight:600;color:var(--gold-l);flex-shrink:0;white-space:nowrap;}

/* BRACKET */
.bracket-scroll{overflow-x:auto;padding-bottom:16px;}
.bracket{display:flex;align-items:flex-start;min-width:max-content;}
.round{display:flex;flex-direction:column;align-items:stretch;flex-shrink:0;width:220px;}
.round-label{font-family:'Barlow Condensed',cursive;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.70);text-align:center;height:44px;margin-bottom:6px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-transform:uppercase;font-weight:700;}
.date-sub{font-size:11px;font-weight:600;color:var(--gold-l);letter-spacing:1px;}
.slot{display:flex;flex-direction:column;justify-content:flex-start;flex-shrink:0;}
.r16 .slot{height:var(--slot);}.r16 .slot:last-child{height:var(--card-h);}
.qf .slot{height:calc(var(--slot)*2);}.qf .slot:last-child{height:calc(var(--slot)*2 - var(--gap));}
.qf .slot .match{margin-top:calc((var(--slot)*2 - var(--card-h))/2);}
.sf .slot{height:calc(var(--slot)*4);}.sf .slot:last-child{height:calc(var(--slot)*4 - var(--gap));}
.sf .slot .match{margin-top:calc((var(--slot)*4 - var(--card-h))/2);}
.match{width:220px;height:var(--card-h);background:var(--white);border-radius:6px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.2);display:flex;flex-direction:column;flex-shrink:0;}
.mi{display:flex;align-items:center;gap:5px;padding:2px 8px;background:rgba(26,45,66,0.07);border-bottom:1px solid var(--gray-l);flex-shrink:0;}
.mi .mno{font-family:'Barlow Condensed',cursive;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--teal-d);flex-shrink:0;}
.mi .mdate{font-size:9px;color:var(--gray);flex-shrink:0;}
.women-mode .mi{background:rgba(123,45,139,0.07);}.women-mode .mi .mno{color:var(--purple-d);}
.team{flex:1;display:flex;flex-direction:column;justify-content:center;padding:3px 8px;border-bottom:1px solid var(--gray-l);}
.team:last-child{border-bottom:none;}
.team-top{display:flex;align-items:center;gap:5px;}
.ct{font-size:8px;font-weight:800;color:#fff;border-radius:2px;padding:1px 4px;flex-shrink:0;min-width:28px;text-align:center;letter-spacing:0.5px;background:var(--bg2);}
.ct.jpn{background:var(--teal-d);}.women-mode .ct.jpn{background:var(--purple-d);}
.pn1{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.pn2{font-size:10px;font-weight:500;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:33px;margin-top:1px;}
.team.winner{background:linear-gradient(90deg,#FFFAED,#FFF8E7);}.women-mode .team.winner{background:linear-gradient(90deg,#FFF0FF,#FAE8FF);}
.team.loser .pn1,.team.loser .pn2{color:var(--gray);}
.team.loser .ct{background:#aaa;}.team.loser .ct.jpn{background:rgba(26,140,133,0.45);}.women-mode .team.loser .ct.jpn{background:rgba(123,45,139,0.45);}
.tbd{flex:1;display:flex;align-items:center;padding:3px 8px;border-bottom:1px solid var(--gray-l);}
.tbd:last-child{border-bottom:none;}
.tbd-b{font-size:8px;font-weight:700;color:#fff;background:#ccc;border-radius:2px;padding:1px 4px;margin-right:5px;}
.sc-div{display:flex;align-items:center;justify-content:center;padding:1px 6px;background:#F5F7FA;border-top:1px solid var(--gray-l);border-bottom:1px solid var(--gray-l);gap:4px;flex-shrink:0;}
.sc-s{font-size:11px;font-weight:700;color:var(--text);}.sc-p{font-size:8px;color:var(--gray);}
.conn{width:24px;flex-shrink:0;position:relative;}.conn svg{position:absolute;top:0;left:0;width:24px;overflow:visible;}
.date-div{width:2px;flex-shrink:0;margin:0 3px;position:relative;}.date-div::after{content:'';position:absolute;top:0;bottom:0;left:0;width:2px;border-left:2px dashed rgba(46,196,182,0.4);}
.champ-wrap{flex-shrink:0;display:flex;flex-direction:column;padding-left:10px;}
.champ-card{background:linear-gradient(135deg,#C67E00,var(--gold-l),#C67E00);border-radius:8px;padding:14px 12px;width:150px;text-align:center;color:#fff;box-shadow:0 4px 20px rgba(240,165,0,0.35);}
.women-mode .champ-card{background:linear-gradient(135deg,#5B1A6A,var(--purple),#5B1A6A);box-shadow:0 4px 20px rgba(200,109,215,0.35);}
.champ-trophy{font-size:28px;margin-bottom:4px;}.champ-label{font-family:'Barlow Condensed',cursive;font-size:11px;letter-spacing:3px;opacity:0.85;margin-bottom:4px;text-transform:uppercase;}.champ-p1{font-size:12px;font-weight:700;line-height:1.3;}
.bronze-label{font-family:'Barlow Condensed',cursive;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.70);text-align:center;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;text-transform:uppercase;font-weight:700;}
.bronze-date{font-size:10px;color:#CD7F32;margin-left:4px;}

/* ===== WHITE BG + GREEN OVERRIDE ===== */
body { background:#F0F2F5 !important; background-image:none !important; }
.hd h1 { color:#111 !important; }
.hd-eye, .hd-sub { color:#333 !important; }
.hd h1 em { color:#333 !important; }
.hd-tag { background:#fff !important; border:1px solid #CCC !important; color:#222 !important; }
.hd-tag.jpn { background:rgba(46,196,182,0.1) !important; border-color:#1A8C85 !important; color:#1A8C85 !important; }
.toggle-btn { background:#fff !important; border:2px solid #CCC !important; color:#222 !important; }
.sub-tab { background:#fff !important; border:1.5px solid #CCC !important; color:#333 !important; }
.pool-card { background:#fff !important; border:1px solid #DDD !important; box-shadow:0 1px 4px rgba(0,0,0,0.08) !important; }
.pool-title { background:#2EC4B6 !important; color:#fff !important; border-bottom-color:#1A8C85 !important; }
.women-mode .pool-title { background:#9B3DAF !important; border-bottom-color:#7B2D8F !important; }
.pool-table th { color:#333 !important; background:#F8F8F8 !important; }
.pool-table td { color:#111 !important; }
.pool-table tr.adv td { color:#111 !important; font-weight:600; }
.rank-num { color:#333 !important; }
.mr-row { display:flex; align-items:center; background:#FAFAFA !important; border:1px solid #EEE !important; border-radius:4px; padding:4px 8px; gap:5px; font-size:10px; }
.mr-date { font-size:9px; color:#333 !important; width:42px; flex-shrink:0; }
.mr-vs { font-size:9px; color:#555 !important; flex-shrink:0; }
.mr-score { font-size:9px; font-weight:600; color:#333 !important; flex-shrink:0; white-space:nowrap; }
.mr-team { flex:1; display:flex; align-items:center; gap:4px; }
.mr-team span.mr-name { color:#2E7D32 !important; font-weight:400; }
.mr-team.winner span.mr-name { color:#1B5E20 !important; font-weight:700; }
.mr-team.loser span.mr-name { color:#2E7D32 !important; font-weight:400; }
.match { border:1px solid #E0E0E0 !important; box-shadow:0 1px 6px rgba(0,0,0,0.1) !important; }
.match-info, .mi { background:#F0F8F8 !important; }
.women-mode .match-info, .women-mode .mi { background:#F8F0FF !important; }
.match-info .mno, .mi .mno { color:#1A8C85 !important; }
.women-mode .match-info .mno, .women-mode .mi .mno { color:#7B2D8F !important; }
.match-info .mtime, .mi .mtime { color:#111 !important; }
.match-info .mcourt, .mi .mcourt { color:#333 !important; }
.match-info .mdot, .mi .mdot { color:#CCC !important; }
.pn1 { color:#2E7D32 !important; font-weight:400; }
.pn2 { color:#2E7D32 !important; font-weight:400; }
.team.winner .pn1, .team.winner .pn2 { color:#1B5E20 !important; font-weight:700; }
.team.loser .pn1, .team.loser .pn2 { color:#2E7D32 !important; font-weight:400; }
.team.winner { background:#F1F8E9 !important; }
.women-mode .team.winner { background:#F3E5F5 !important; }
.sc-s { color:#111 !important; }
.sc-p { color:#333 !important; }
.round-label { color:#222 !important; }
.date-sub { color:#1A8C85 !important; }
.bronze-label { color:#222 !important; }
.bronze-date { color:#1A8C85 !important; }
.ct { background:#666 !important; color:#fff !important; }
.ct.jpn { background:#1A8C85 !important; }
.women-mode .ct.jpn { background:#7B2D8F !important; }
/* ===== END OVERRIDE ===== */
</style>
</head>

<script>
let curGender='men', curTab='pool';

function switchGender(g,btn){
  curGender=g;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+g).classList.add('active');
  btn.classList.add('active');
  document.getElementById('tag-gender').textContent=g==='men'?"MEN'S":"WOMEN'S";
  document.body.classList.toggle('women-mode',g==='women');
  if(curTab==='draw') requestAnimationFrame(()=>requestAnimationFrame(()=>drawBracket('bracket-'+g)));
}

function switchTab(tab,btn){
  curTab=tab;
  document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['men','women'].forEach(g=>{
    document.getElementById(g+'-pool').classList.toggle('active',tab==='pool');
    document.getElementById(g+'-draw').classList.toggle('active',tab==='draw');
  });
  if(tab==='draw') requestAnimationFrame(()=>requestAnimationFrame(()=>drawBracket('bracket-'+curGender)));
}

// ===== HELPERS =====
function cpill(ctry,jpn){return `<span class="ctry-pill${jpn?' jpn':''}">${ctry}</span>`;}

function teamRow(tname,ctry,jpn,result){
  const parts=tname.split('/');
  const p1=parts[0]||tname, p2=parts[1]||'';
  const resCls=result==='win'?' winner':result==='lose'?' loser':'';
  const jpnCls=jpn?' jpn':'';
  return `<div class="team${resCls}">
    <div class="team-top"><span class="ct${jpnCls}">${ctry}</span><span class="pn1">${p1}</span></div>
    ${p2?`<div class="pn2">${p2}</div>`:''}
  </div>`;
}

function tbdRow(){return `<div class="tbd"><span class="tbd-b">?</span><span style="font-size:11px;color:#bbb;">TBD</span></div>`;}

function scDiv(sc){
  if(!sc) return '';
  const m=sc.match(/^(\d+)-(\d+)\s*\(([^)]+)\)$/);
  if(!m) return '';
  return `<div class="sc-div"><span class="sc-s">${m[1]}</span><span class="sc-p">(${m[3]})</span><span class="sc-s">${m[2]}</span></div>`;
}

function mInfo(no,date){
  return `<div class="mi"><span class="mno">#${no}</span><span class="mdate">${date}</span></div>`;
}

function matchCard(no,date,tA,cA,jpnA,tB,cB,jpnB,winner,sc){
  const rA=winner==='A'?'win':winner?'lose':'';
  const rB=winner==='B'?'win':winner?'lose':'';
  return `<div class="match">${mInfo(no,date)}${teamRow(tA,cA,jpnA,rA)}${sc&&winner?scDiv(sc):''}${teamRow(tB,cB,jpnB,rB)}</div>`;
}

function champCard(name,date){
  return `<div class="champ-wrap" id="champ-wrap">
    <div class="round-label" style="opacity:0">-</div>
    <div style="display:flex;align-items:center;padding-left:8px;" id="champ-inner">
      <div class="champ-card">
        <div class="champ-trophy">🏆</div>
        <div class="champ-label">Champion</div>
        <div class="champ-p1" id="champ-name">${name||'TBD'}</div>
      </div>
    </div>
  </div>`;
}

function round(cls,label,date,cards){
  return `<div class="round ${cls}"><div class="round-label">${label}<br><span class="date-sub">${date}</span></div>${cards.map(c=>`<div class="slot">${c}</div>`).join('')}</div>`;
}
function conn(id){return `<div class="conn" id="c${id}"><svg id="s${id}"></svg></div>`;}
function ddiv(){return `<div class="date-div"></div>`;}

// ===== POOL PLAY RENDER =====
function renderPools(gender){
  const POOLS=gender==='men'?MEN_POOLS:WOMEN_POOLS;
  const el=document.getElementById(gender+'-pool');
  let html=`<div class="pools-grid">`;

  // Calculate standings
  Object.entries(POOLS).forEach(([pk,pool])=>{
    const teams=pool.teams;
    const stats={};
    teams.forEach(t=>{stats[t.name]={mw:0,ml:0,sw:0,sl:0,jpn:t.jpn,ctry:t.ctry};} );
    pool.matches.forEach(m=>{
      const wn=m.w==='a'?m.a:m.b, ln=m.w==='a'?m.b:m.a;
      const sc=m.sc||'';
      const mp=sc.match(/(\d+)-(\d+)/);
      if(mp){
        const sw=parseInt(mp[m.w==='a'?1:2]), sl=parseInt(mp[m.w==='a'?2:1]);
        if(stats[wn]){stats[wn].mw++;stats[wn].sw+=sw;stats[wn].sl+=sl;}
        if(stats[ln]){stats[ln].ml++;stats[ln].sl+=sw;stats[ln].sw+=sl;}
      }
    });
    const sorted=teams.map(t=>{return {...t,...stats[t.name]}}).sort((a,b)=>{
      const mpa=(a.mw||0)*2+(a.ml||0)*0, mpb=(b.mw||0)*2+(b.ml||0)*0;
      return mpb-mpa;
    });

    html+=`<div class="pool-card"><div class="pool-title">Pool ${pk}</div>
    <table class="pool-table"><thead><tr><th></th><th>Team</th><th>W</th><th>L</th><th>SW</th><th>SL</th></tr></thead><tbody>`;
    sorted.forEach((t,i)=>{
      const adv=i<2;
      html+=`<tr class="${adv?'adv':'elim'}">
        <td class="rank-num">${i+1}</td>
        <td>${cpill(t.ctry,t.jpn)}${t.name}${adv?`<span class="adv-badge">→Main</span>`:''}</td>
        <td>${t.mw||0}</td><td>${t.ml||0}</td><td>${t.sw||0}</td><td>${t.sl||0}</td>
      </tr>`;
    });
    html+=`</tbody></table>`;
    if(pool.matches.length>0){
      html+=`<div class="mr-list" style="padding:8px 10px 10px;display:flex;flex-direction:column;gap:3px;"><div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:#888;margin-bottom:5px;">MATCHES</div>`;
      pool.matches.forEach(m=>{
        const wA=m.w==='a', wB=m.w==='b';
        html+=`<div class="mr-row">
          <span class="mr-date">${m.d}</span>
          <div class="mr-team ${wA?'winner':'loser'}">${cpill(m.ca,m.ja)}<span class="mr-name">${m.a}</span></div>
          <span class="mr-vs">vs</span>
          <div class="mr-team ${wB?'winner':'loser'}">${cpill(m.cb,m.jb)}<span class="mr-name">${m.b}</span></div>
          <span class="mr-score">${m.sc||''}</span>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

// ===== BRACKET =====
function buildBracket(bid){
  const isMen=bid==='bracket-men';
  const R16=isMen?MEN_R16:WOMEN_R16;
  const QF=isMen?MEN_QF:WOMEN_QF;
  const SF=isMen?MEN_SF:WOMEN_SF;
  const F3=isMen?MEN_F3:WOMEN_F3;
  const F1=isMen?MEN_F1:WOMEN_F1;
  const pid=isMen?'M':'W';

  const r16Cards=R16.map((m,i)=>matchCard(i+1,m.d,m.tA,m.cA,m.jpnA,m.tB,m.cB,m.jpnB,m.w,m.sc));
  const qfCards=QF.map((m,i)=>matchCard('QF'+(i+1),m.d,m.tA,m.cA,m.jpnA,m.tB,m.cB,m.jpnB,m.w,m.sc));
  const sfCards=SF.map((m,i)=>matchCard('SF'+(i+1),m.d,m.tA,m.cA,m.jpnA,m.tB,m.cB,m.jpnB,m.w,m.sc));
  const f1Card=matchCard('F1',F1.d,F1.tA,F1.cA,F1.jpnA,F1.tB,F1.cB,F1.jpnB,F1.w,F1.sc);
  const f3Card=matchCard('F3',F3.d,F3.tA,F3.cA,F3.jpnA,F3.tB,F3.cB,F3.jpnB,F3.w,F3.sc);
  const champName=F1.w==='A'?F1.tA:F1.tB;

  document.getElementById(bid).innerHTML=
    round('r16','Round of 16','13-14 Apr',r16Cards)+
    ddiv()+conn(pid+'rq')+
    round('qf','Quarterfinals','14 Apr',qfCards)+
    conn(pid+'qs')+
    round('sf','Semifinals','15 Apr',sfCards)+
    conn(pid+'sf')+
    `<div style="flex-shrink:0;display:flex;flex-direction:column;height:calc(var(--slot)*8 - var(--gap));justify-content:center;gap:80px;">
      ${round('fin','Final','15 Apr',[f1Card])}
      <div style="padding-left:0;">
        <div class="bronze-label">Bronze Medal Match<span class="bronze-date">15 Apr</span></div>
        ${f3Card}
      </div>
    </div>`+
    champCard(champName);

  requestAnimationFrame(()=>requestAnimationFrame(()=>drawBracket(bid)));
  setTimeout(()=>{
    const br=document.getElementById(bid);
    if(br) br.querySelectorAll('.date-div').forEach(d=>d.style.height=br.scrollHeight+50+'px');
  },100);
}

function drawBracket(bid){
  const br=document.getElementById(bid);
  if(!br) return;
  const bRect=br.getBoundingClientRect();
  const totalH=br.scrollHeight;
  const isMen=bid==='bracket-men';
  const pid=isMen?'M':'W';
  const LINE=isMen?'rgba(46,196,182,0.5)':'rgba(200,109,215,0.5)';

  function centers(cls){
    return Array.from(br.querySelectorAll(`.`+cls+` .match`)).map(el=>{
      const r=el.getBoundingClientRect();
      return r.top+r.height/2-bRect.top;
    });
  }
  function draw(sid,cid,src,dst){
    const cEl=document.getElementById(cid),svg=document.getElementById(sid);
    if(!cEl||!svg) return;
    const w=cEl.getBoundingClientRect().width;
    svg.setAttribute('width',w);svg.setAttribute('height',totalH);
    let out='';const xm=w/2,SW=1.5;
    for(let i=0;i<dst.length;i++){
      const y1=src[i*2],y2=src[i*2+1],yd=dst[i];
      out+=`<line x1="0" y1="${y1}" x2="${xm}" y2="${y1}" stroke="${LINE}" stroke-width="${SW}"/>`;
      out+=`<line x1="0" y1="${y2}" x2="${xm}" y2="${y2}" stroke="${LINE}" stroke-width="${SW}"/>`;
      out+=`<line x1="${xm}" y1="${y1}" x2="${xm}" y2="${y2}" stroke="${LINE}" stroke-width="${SW}"/>`;
      out+=`<line x1="${xm}" y1="${yd}" x2="${w}" y2="${yd}" stroke="${LINE}" stroke-width="${SW}"/>`;
    }
    svg.innerHTML=out;
  }

  draw('s'+pid+'rq','c'+pid+'rq',centers('r16'),centers('qf'));
  draw('s'+pid+'qs','c'+pid+'qs',centers('qf'),centers('sf'));
  draw('s'+pid+'sf','c'+pid+'sf',centers('sf'),centers('fin'));

  const finEl=br.querySelector('.fin .match');
  const ci=br.querySelector('#champ-inner');
  if(finEl&&ci){
    const fr=finEl.getBoundingClientRect();
    const mid=fr.top+fr.height/2-bRect.top;
    const cc=ci.querySelector('.champ-card');
    if(cc){const ch=cc.getBoundingClientRect().height;ci.style.paddingTop=(mid-ch/2)+'px';ci.style.alignItems='flex-start';}
  }
  br.querySelectorAll('.date-div').forEach(d=>d.style.height=totalH+50+'px');
}

renderPools('men');
renderPools('women');
buildBracket('bracket-men');
buildBracket('bracket-women');
</script>
