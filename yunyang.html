<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=0.25, user-scalable=yes, minimum-scale=0.1, maximum-scale=5.0">
<title>AVC Beach Tour 2026 - Yunyang Open</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FFFFFF;--bg2:#F5F7FA;
  --teal:#2EC4B6;--teal-dark:#1A8C85;
  --purple:#9B3DAF;--purple-dark:#7B2D8F;
  --white:#FFFFFF;--gray:#888;--gray-light:#E0E0E0;
  --text:#222;--border:#DDD;
  --card-h:106px;--gap:8px;--slot:calc(var(--card-h) + var(--gap));
}
body{font-family:'Barlow',sans-serif;background:#F0F2F5;min-height:100vh;color:var(--text);padding:20px 16px 60px;}
.hd{text-align:center;margin-bottom:20px;}
.hd-logo{height:110px;display:block;margin:0 auto 8px;}
.hd-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,2.5vw,26px);font-weight:800;color:#111;letter-spacing:2px;text-transform:uppercase;}
.hd-sub{font-size:12px;color:#222;margin-top:4px;}
.hd-meta{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.hd-tag{background:#fff;border:1px solid #CCC;color:#222;font-size:10px;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;}
.toggle-wrap{display:flex;justify-content:center;gap:10px;margin-bottom:14px;}
.toggle-btn{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;padding:7px 26px;border-radius:6px;border:2px solid #CCC;background:#fff;color:#222;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.toggle-btn.active{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 2px 12px rgba(46,196,182,0.3);}
.sub-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:18px;}
.sub-tab{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;padding:5px 22px;border-radius:6px;border:1.5px solid #CCC;background:#fff;color:#222;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.sub-tab.active{background:rgba(46,196,182,0.1);border-color:var(--teal);color:var(--teal-dark);}
.view{display:none;}.view.active{display:block;}
.sub-view{display:none;}.sub-view.active{display:block;}
.pools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:22px;}
.pool-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.pool-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;padding:7px 12px;background:var(--teal);color:#fff;border-bottom:1px solid var(--teal-dark);}
.pool-table{width:100%;border-collapse:collapse;font-size:11px;}
.pool-table th{padding:5px 8px;text-align:center;color:#333;font-size:9px;letter-spacing:1px;border-bottom:1px solid #EEE;background:#F8F8F8;}
.pool-table th:first-child,.pool-table th:nth-child(2){text-align:left;}
.pool-table td{padding:5px 8px;text-align:center;color:#111;border-bottom:1px solid #F0F0F0;}
.pool-table td:nth-child(2){text-align:left;}
.pool-table tr:last-child td{border-bottom:none;}
.pool-table tr.adv td{color:#111;font-weight:600;}
.rank-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:#333;}
.pool-table tr.adv .rank-num{color:var(--teal-dark);}
.nat-pill{display:inline-block;font-size:8px;font-weight:700;color:#fff;background:#666;border-radius:2px;padding:1px 4px;min-width:26px;text-align:center;flex-shrink:0;}
.jpn-pill{display:inline-block;font-size:8px;font-weight:700;color:#fff;background:var(--teal-dark);border-radius:2px;padding:1px 4px;min-width:26px;text-align:center;flex-shrink:0;}
.women-mode .jpn-pill{background:var(--purple);}
.adv-badge{font-size:8px;font-weight:700;color:var(--teal-dark);margin-left:4px;}
.women-mode .adv-badge{color:var(--purple-dark);}
.women-mode .pool-title{background:var(--purple);border-bottom-color:var(--purple-dark);}
.women-mode .pool-table tr.adv .rank-num{color:var(--purple-dark);}
.women-mode .sub-tab.active{background:rgba(155,61,175,0.1);border-color:var(--purple);color:var(--purple-dark);}
.women-mode .toggle-btn.active{background:var(--purple);border-color:var(--purple);}
.women-mode .team.jpn-hi{background:#F5E8FF;border-left:3px solid var(--purple);}
.women-mode .mr-no{color:var(--purple-dark);}
.women-mode .date-sub{color:var(--purple-dark);}
.women-mode .round-label .mr-no{color:var(--purple-dark);}
.women-mode .mi .mno{color:var(--purple-dark);}
.women-mode .badge{background:var(--purple-dark);}
.women-mode .team.jpn-hi{background:#F5EEFF;border-left-color:var(--purple);}
.women-mode .pool-table tr.adv .rank-num{color:var(--purple-dark);}
.mr-list{display:flex;flex-direction:column;gap:3px;padding:8px 10px 10px;}
.mr-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:#333;margin-bottom:5px;}
.mr-row{display:flex;align-items:center;background:#FAFAFA;border:1px solid #EEE;border-radius:4px;padding:4px 8px;gap:5px;font-size:10px;}
.mr-no{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--teal-dark);width:36px;flex-shrink:0;}
.mr-date{font-size:9px;color:#333;width:32px;flex-shrink:0;}
.mr-court{font-size:9px;color:#333;width:28px;flex-shrink:0;}
.mr-team{flex:1;display:flex;flex-direction:column;}
.mr-team span.mr-n{color:#2E7D32;font-weight:400;}
.mr-team span.mr-n2{font-size:9px;color:#2E7D32;margin-top:1px;}
.mr-team.winner span.mr-n{color:#111;font-weight:700;}
.mr-team.winner span.mr-n2{color:#1B5E20;font-weight:700;}
.mr-team.loser span.mr-n{color:#2E7D32;font-weight:400;}
.mr-team.loser span.mr-n2{color:#2E7D32;}
.mr-vs{font-size:9px;color:#555;flex-shrink:0;}
.mr-sc{font-size:9px;font-weight:600;color:#111;flex-shrink:0;white-space:nowrap;}
.bracket-scroll{overflow-x:auto;padding-bottom:16px;}
.bracket{display:flex;align-items:flex-start;min-width:max-content;}
.round{display:flex;flex-direction:column;align-items:stretch;flex-shrink:0;width:240px;}
.round-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:#222;text-align:center;height:44px;margin-bottom:6px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-transform:uppercase;}
.date-sub{font-size:11px;font-weight:700;color:var(--teal-dark);letter-spacing:1px;}
.slot{display:flex;flex-direction:column;justify-content:flex-start;flex-shrink:0;}
.r16 .slot{height:var(--slot);}.r16 .slot:last-child{height:var(--card-h);}
.qf .slot{height:calc(var(--slot)*2);}.qf .slot:last-child{height:calc(var(--slot)*2 - var(--gap));}
.qf .slot .match{margin-top:calc((var(--slot)*2 - var(--card-h))/2);}
.sf .slot{height:calc(var(--slot)*4);}.sf .slot:last-child{height:calc(var(--slot)*4 - var(--gap));}
.sf .slot .match{margin-top:calc((var(--slot)*4 - var(--card-h))/2);}
.fin .slot{height:calc(var(--slot)*8 - var(--gap));}
.fin .slot .match{margin-top:calc((var(--slot)*8 - var(--card-h))/2);}
.match{width:240px;min-height:var(--card-h);background:#fff;border-radius:7px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.12);display:flex;flex-direction:column;flex-shrink:0;border:1px solid #E0E0E0;}
.mi{display:flex;align-items:center;gap:4px;padding:3px 7px;background:#F0F8F8;border-bottom:1px solid #DDD;flex-shrink:0;flex-wrap:wrap;}
.mi .mno{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1px;color:var(--teal-dark);font-weight:700;flex-shrink:0;}
.mi .mtime{font-size:9px;font-weight:700;color:#111;flex-shrink:0;}
.mi .mcourt{font-size:9px;color:#333;flex-shrink:0;}
.mi .mdot{font-size:8px;color:#CCC;}
.team{flex:1;display:flex;flex-direction:column;justify-content:center;padding:3px 8px;border-bottom:1px solid #EEE;}
.team:last-child{border-bottom:none;}
.team-top{display:flex;align-items:center;gap:4px;}
.badge{font-size:8px;font-weight:700;color:#fff;background:var(--teal-dark);border-radius:3px;padding:1px 4px;flex-shrink:0;min-width:26px;text-align:center;}
.badge.tbd{background:#BBB;}
.p1{font-size:11px;font-weight:400;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.p2{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:400;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:0;margin-top:1px;}
.p2-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p2-badge-wrap{flex-shrink:0;min-width:26px;}
.team.winner .p1,.team.winner .p2-name,.team.winner .p2{font-weight:700;color:#1B5E20;}
.team.winner{background:#F0FBF9;}
.team.loser .p1,.team.loser .p2{color:#2E7D32;font-weight:400;}
.team.dim .p1,.team.dim .p2{color:#BBB;}
.team.jpn-hi{background:#E8F8F6;border-left:3px solid var(--teal);}
.sc-div{display:flex;align-items:center;justify-content:center;padding:2px 6px;background:#F8F8F8;border-top:1px solid #EEE;border-bottom:1px solid #EEE;gap:4px;flex-shrink:0;}
.sc-s{font-size:11px;font-weight:700;color:#111;}
.sc-p{font-size:9px;color:#333;}
.conn{width:28px;flex-shrink:0;position:relative;}
.conn svg{position:absolute;top:0;left:0;width:28px;overflow:visible;}
.champ-card{background:linear-gradient(135deg,var(--teal-dark),var(--teal),var(--teal-dark));border-radius:10px;padding:14px 12px;width:150px;text-align:center;color:#fff;box-shadow:0 4px 20px rgba(46,196,182,0.3);}
</style>
</head>

function getAllTeams(pools){const m={};pools.forEach(p=>p.teams.forEach(t=>m[t.id]=t));return m;}

function buildPoolHTML(pools){
  const allTeams=getAllTeams(pools);
  let html='<div class="pools-grid">';
  pools.forEach(pool=>{
    html+=`<div class="pool-card"><div class="pool-title">POOL ${pool.key}</div>`;
    html+=`<table class="pool-table"><thead><tr><th>#</th><th>Team</th><th>NF</th><th>W</th><th>L</th></tr></thead><tbody>`;
    const sorted=[...pool.teams].sort((a,b)=>a.rank-b.rank);
    sorted.forEach((t,i)=>{
      const jpnCls=t.jpn?' jpn-hi':'';
      let w=0,l=0;
      pool.matches.forEach(m=>{if((m.a===t.id||m.b===t.id)&&m.w){if(m.w===t.id)w++;else l++;}});
      const adv=(i===0||i===1)?'adv':'';
      const advBadge=(i===0||i===1)?'<span class="adv-badge">&#9654;MD</span>':'';
      const natBadge=t.jpn?`<span class="jpn-pill">JPN</span>`:`<span class="nat-pill">${t.nat}</span>`;
      html+=`<tr class="${adv}"><td class="rank-num">${i+1}</td><td class="${jpnCls}">${t.p1} / ${t.p2}${advBadge}</td><td>${natBadge}</td><td>${w}</td><td>${l}</td></tr>`;
    });
    html+='</tbody></table>';
    if(pool.matches.length>0){
      html+='<div class="mr-list"><div class="mr-title">MATCHES</div>';
      pool.matches.forEach(m=>{
        const ta=allTeams[m.a],tb=allTeams[m.b];
        const ra=m.w===m.a?'winner':m.w?'loser':'';
        const rb=m.w===m.b?'winner':m.w?'loser':'';
        const jst=addHour(m.local);
        html+=`<div class="mr-row">
          <span class="mr-no">${m.no}</span>
          <span class="mr-date">${m.date} ${m.local}</span>
          <span class="mr-court">Ct.${m.court}</span>
          <span class="mr-team ${ra}"><span class="mr-n">${ta.p1}</span><span class="mr-n2">${ta.p2} <span class="${ta.jpn?'jpn-pill':'nat-pill'}">${ta.nat}</span></span></span>
          <span class="mr-vs">vs</span>
          <span class="mr-team ${rb}"><span class="mr-n">${tb.p1}</span><span class="mr-n2">${tb.p2} <span class="${tb.jpn?'jpn-pill':'nat-pill'}">${tb.nat}</span></span></span>
          <span class="mr-sc">${m.sc||''}</span>
        </div>`;
      });
      html+='</div>';
    }
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function miHtml(no,local,court){
  const jst=addHour(local);
  const timeStr=(local&&local!=='TBD')?`<span class="mtime"> ${local}</span><span class="mdot">&#183;</span><span class="mcourt">JST ${jst}</span><span class="mdot">&#183;</span><span class="mcourt">Ct.${court}</span>`:`<span class="mcourt">Time TBD</span>`;
  return `<div class="mi"><span class="mno">${no}</span>${timeStr}</div>`;
}
function teamRow(t,result){
  if(!t) return `<div class="team dim"><div class="team-top"><span class="badge tbd">?</span><span class="p1">TBD</span></div><div class="p2">-</div></div>`;
  const cls=result==='win'?' winner':result==='lose'?' loser':'';
  const jpnCls=t.jpn?' jpn-hi':'';
  const natBadgeT=t.jpn?`<span class="jpn-pill">JPN</span>`:`<span class="nat-pill">${t.nat}</span>`;
  return `<div class="team${cls}${jpnCls}"><div class="team-top"><span class="badge">${t.seed}</span><span class="p1">${t.p1}</span></div><div class="p2">${natBadgeT}<span class="p2-name">${t.p2}</span></div></div>`;
}
function matchCard(no,local,court,ta,tb,w,sc){
  const ra=w&&ta&&w===ta.id?'win':w?'lose':'';
  const rb=w&&tb&&w===tb.id?'win':w?'lose':'';
  let scDiv='';
  if(sc){const pts=sc.match(/\(([^)]+)\)/);const sets=sc.replace(/\s*\(.*\)/,'').trim().split('-');scDiv=`<div class="sc-div"><span class="sc-s">${sets[0]||''}</span><span class="sc-p">${pts?'('+pts[1]+')':''}</span><span class="sc-s">${sets[1]||''}</span></div>`;}
  return `<div class="match">${miHtml(no,local,court)}${teamRow(ta,ra)}${scDiv}${teamRow(tb,rb)}</div>`;
}
function tbdCard(no,local,court){
  const r=`<div class="team dim"><div class="team-top"><span class="badge tbd">?</span><span class="p1">TBD</span></div><div class="p2">-</div></div>`;
  return `<div class="match">${miHtml(no,local,court)}${r}${r}</div>`;
}
function rnd(cls,label,date,cards){
  return `<div class="round ${cls}"><div class="round-label">${label}<span class="date-sub">${date}</span></div>${cards.map(c=>`<div class="slot">${c}</div>`).join('')}</div>`;
}
function conn(id){return `<div class="conn" id="c${id}"><svg id="s${id}"></svg></div>`;}

    rnd('r16','Round of 16','6/20',r16Cards)+conn('A'+bracketId)+
    rnd('qf','Quarter Finals','6/20',qfCards)+conn('B'+bracketId)+
    rnd('sf','Semi Finals','6/21',sfCards)+conn('C'+bracketId)+
    `<div style="flex-shrink:0;display:flex;flex-direction:column;height:calc(var(--slot)*8 - var(--gap));justify-content:center;gap:80px;">` +
      rnd('fin','Final','6/21',[finCard]) +
      `<div><div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.70);text-align:center;margin-bottom:6px;">3RD PLACE · 6/21</div>${f3Card}</div>` +
    `</div>` +
    champCard;
  requestAnimationFrame(()=>requestAnimationFrame(()=>drawBracket(bracketId)));
}

function drawBracket(bracketId){
  const br=document.getElementById(bracketId);
  if(!br) return;
  const bRect=br.getBoundingClientRect();
  const totalH=br.scrollHeight;
  const lineColor='rgba(46,196,182,0.6)';
  function centers(cls){return Array.from(br.querySelectorAll('.'+cls+' .match')).map(el=>{const r=el.getBoundingClientRect();return r.top+r.height/2-bRect.top;});}
  function draw(svgId,connId,src,dst){
    const connEl=document.getElementById(connId),svg=document.getElementById(svgId);
    if(!connEl||!svg) return;
    const w=connEl.getBoundingClientRect().width;
    svg.setAttribute('width',w);svg.setAttribute('height',totalH);
    let out='';const xm=w/2,SW=1.5;
    for(let i=0;i<dst.length;i++){
      const y1=src[i*2],y2=src[i*2+1],yd=dst[i];
      out+=`<line x1="0" y1="${y1}" x2="${xm}" y2="${y1}" stroke="${lineColor}" stroke-width="${SW}"/>`;
      out+=`<line x1="0" y1="${y2}" x2="${xm}" y2="${y2}" stroke="${lineColor}" stroke-width="${SW}"/>`;
      out+=`<line x1="${xm}" y1="${y1}" x2="${xm}" y2="${y2}" stroke="${lineColor}" stroke-width="${SW}"/>`;
      out+=`<line x1="${xm}" y1="${yd}" x2="${w}" y2="${yd}" stroke="${lineColor}" stroke-width="${SW}"/>`;
    }
    svg.innerHTML=out;
  }
  const c_r16=centers('r16'),c_qf=centers('qf'),c_sf=centers('sf'),c_fin=centers('fin');
  draw('sA'+bracketId,'cA'+bracketId,c_r16,c_qf);
  draw('sB'+bracketId,'cB'+bracketId,c_qf,c_sf);
  draw('sC'+bracketId,'cC'+bracketId,c_sf,c_fin);
}

document.getElementById('men-pool').innerHTML=buildPoolHTML(M_POOLS);
document.getElementById('women-pool').innerHTML=buildPoolHTML(W_POOLS);
buildBracket('bracket-men');
buildBracket('bracket-women');
</script>
