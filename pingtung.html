<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=0.25, user-scalable=yes, minimum-scale=0.1, maximum-scale=5.0">
<title>AVC Beach Tour 2026 - 2nd Pingtung Open</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0D1B2A;
  --bg2: #1A2D42;
  --gold: #F0A500;
  --gold-light: #FFD166;
  --teal: #2EC4B6;
  --teal-dark: #1A8C85;
  --white: #FFFFFF;
  --gray: #8A9BB0;
  --gray-light: #E8EDF2;
  --text: #1A2D42;
  --jpn: #E8F4FF;
  --jpn-border: #2EC4B6;
  --card-h: 106px;
  --gap: 8px;
  --slot: calc(var(--card-h) + var(--gap));
}

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 25%, rgba(46,196,182,0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 75%, rgba(240,165,0,0.06) 0%, transparent 55%);
  min-height: 100vh;
  color: var(--text);
  padding: 20px 16px 60px;
}

/* HEADER */
.hd { text-align:center; margin-bottom:24px; }
.hd-eye { font-size:10px; letter-spacing:5px; color:var(--teal); margin-bottom:4px; font-weight:600; text-transform:uppercase; }
.hd h1 { font-family:'Barlow Condensed',cursive; font-size:clamp(24px,4vw,48px); color:var(--white); letter-spacing:2px; line-height:1; font-weight:800; text-transform:uppercase; }
.hd h1 em { color:var(--gold-light); font-style:normal; }
.hd-meta { display:flex; justify-content:center; gap:10px; margin-top:10px; flex-wrap:wrap; }
.hd-tag { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.88); font-size:10px; letter-spacing:2px; padding:3px 12px; border-radius:3px; font-weight:600; text-transform:uppercase; }
.hd-tag.jpn { border-color:var(--teal); color:var(--teal); background:rgba(46,196,182,0.1); }

/* TOGGLE */
.toggle-wrap { display:flex; justify-content:center; gap:10px; margin-bottom:24px; }
.toggle-btn { font-family:'Barlow Condensed',cursive; font-size:16px; letter-spacing:3px; padding:8px 32px; border-radius:3px; border:2px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.80); cursor:pointer; transition:all 0.2s; text-transform:uppercase; font-weight:700; }
.toggle-btn.active { background:var(--teal-dark); border-color:var(--teal); color:#fff; box-shadow:0 2px 16px rgba(46,196,182,0.3); }
.toggle-btn.women-btn.active { background:#7B2D8B; border-color:#C86DD7; color:#fff; box-shadow:0 2px 16px rgba(200,109,215,0.3); }

/* VIEW */
.view { display:none; }
.view.active { display:block; }

/* SUB TABS */
.sub-tabs { display:flex; justify-content:center; gap:8px; margin-bottom:20px; }
.sub-tab {
  font-family:'Barlow Condensed',cursive; font-size:14px; letter-spacing:2px;
  padding:6px 24px; border-radius:3px; border:1.5px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.80);
  cursor:pointer; transition:all 0.2s; text-transform:uppercase; font-weight:700;
}
.sub-tab.active { background:rgba(46,196,182,0.2); border-color:var(--teal); color:var(--teal); }
.women-mode .sub-tab.active { background:rgba(200,109,215,0.2); border-color:#C86DD7; color:#C86DD7; }
.sub-view { display:none; }
.sub-view.active { display:block; }

/* POOL PLAY */
.pools-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; margin-bottom:24px; }
.pool-card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; overflow:hidden; }
.pool-title { font-family:'Barlow Condensed',cursive; font-size:14px; letter-spacing:3px; font-weight:700; text-transform:uppercase; padding:8px 14px; background:rgba(46,196,182,0.15); color:var(--teal); border-bottom:1px solid rgba(46,196,182,0.2); }
.women-mode .pool-title { background:rgba(200,109,215,0.15); color:#C86DD7; border-bottom-color:rgba(200,109,215,0.2); }
.pool-table { width:100%; border-collapse:collapse; font-size:11px; }
.pool-table th { padding:5px 8px; text-align:center; color:var(--gray); font-weight:600; font-size:9px; letter-spacing:1px; border-bottom:1px solid rgba(255,255,255,0.08); text-transform:uppercase; }
.pool-table th:first-child { text-align:left; }
.pool-table td { padding:6px 8px; text-align:center; color:rgba(255,255,255,0.88); border-bottom:1px solid rgba(255,255,255,0.06); font-size:11px; }
.pool-table td:first-child { text-align:left; }
.pool-table tr:last-child td { border-bottom:none; }
.pool-table tr.advanced td { color:var(--white); }
.pool-table tr.advanced .team-cell { font-weight:600; }
.rank-cell { font-family:'Barlow Condensed',cursive; font-weight:700; font-size:13px; color:var(--gray); width:20px; }
.pool-table tr.advanced .rank-cell { color:var(--teal); }
.women-mode .pool-table tr.advanced .rank-cell { color:#C86DD7; }
.ctry-pill { display:inline-block; font-size:8px; font-weight:700; color:#fff; background:var(--bg2); border-radius:2px; padding:1px 4px; margin-right:4px; }
.ctry-pill.jpn { background:var(--teal-dark); }
.women-mode .ctry-pill.jpn { background:#7B2D8B; }
.adv-badge { font-size:8px; font-weight:700; color:var(--teal); margin-left:4px; }
.women-mode .adv-badge { color:#C86DD7; }

/* MATCH RESULTS */
.matches-title { font-family:'Barlow Condensed',cursive; font-size:13px; letter-spacing:3px; font-weight:700; text-transform:uppercase; color:rgba(255,255,255,0.80); margin:20px 0 10px; }
.match-result-list { display:flex; flex-direction:column; gap:6px; }
.match-result-row { display:flex; align-items:center; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:5px; padding:7px 12px; gap:8px; font-size:11px; }
.mr-pool { font-family:'Barlow Condensed',cursive; font-size:10px; font-weight:700; color:var(--teal); width:28px; flex-shrink:0; letter-spacing:1px; }
.women-mode .mr-pool { color:#C86DD7; }
.mr-date { font-size:9px; color:var(--gray); width:40px; flex-shrink:0; }
.mr-team { flex:1; display:flex; align-items:center; gap:4px; }
.mr-team.winner span.mr-name { font-weight:700; color:var(--white); }
.mr-team.loser span.mr-name { color:var(--gray); }
.mr-vs { font-size:9px; color:var(--gray); flex-shrink:0; }
.mr-score { font-size:10px; font-weight:600; color:var(--gold-light); flex-shrink:0; white-space:nowrap; }

/* BRACKET */
.bracket-scroll { overflow-x:auto; padding-bottom:16px; }
.bracket { display:flex; align-items:flex-start; min-width:max-content; gap:0; }

/* ROUND */
.round { display:flex; flex-direction:column; align-items:stretch; flex-shrink:0; width:220px; }
.round-label { font-family:'Barlow Condensed',cursive; font-size:12px; letter-spacing:3px; color:rgba(255,255,255,0.70); text-align:center; height:44px; line-height:16px; margin-bottom:6px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; text-transform:uppercase; font-weight:700; }
.date-sub { font-family:'Barlow',sans-serif; font-size:11px; font-weight:600; color:var(--gold-light); letter-spacing:1px; }

/* SLOTS */
.slot { display:flex; flex-direction:column; justify-content:flex-start; flex-shrink:0; }
.r16 .slot { height:var(--slot); }
.r16 .slot:last-child { height:var(--card-h); }
.qf .slot { height:calc(var(--slot)*2); }
.qf .slot:last-child { height:calc(var(--slot)*2 - var(--gap)); }
.qf .slot .match { margin-top:calc((var(--slot)*2 - var(--card-h))/2); }
.sf .slot { height:calc(var(--slot)*4); }
.sf .slot:last-child { height:calc(var(--slot)*4 - var(--gap)); }
.sf .slot .match { margin-top:calc((var(--slot)*4 - var(--card-h))/2); }
.fin .slot { height:calc(var(--slot)*8 - var(--gap)); }
.fin .slot .match { margin-top:calc((var(--slot)*8 - var(--card-h))/2); }

/* CARD */
.match {
  width:220px; height:var(--card-h);
  background:var(--white); border-radius:6px;
  overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.2);
  display:flex; flex-direction:column; flex-shrink:0;
}

/* MATCH INFO BAR */
.match-info {
  display:flex; align-items:center; gap:5px;
  padding:2px 8px;
  background:rgba(26,45,66,0.07);
  border-bottom:1px solid var(--gray-light);
  flex-shrink:0;
}
.mno { font-family:'Barlow Condensed',cursive; font-size:9px; font-weight:700; letter-spacing:1px; color:var(--teal-dark); flex-shrink:0; }
.mtime { font-size:9px; font-weight:600; color:var(--text); flex-shrink:0; }
.mcourt { font-size:9px; color:var(--gray); flex-shrink:0; }
.mdot { font-size:8px; color:#ccc; }

/* WOMEN info bar */
#bracket-women .match-info { background:rgba(123,45,139,0.07); }
#bracket-women .mno { color:#7B2D8B; }

/* TEAM ROW */
.team { flex:1; display:flex; flex-direction:column; justify-content:center; padding:3px 8px; border-bottom:1px solid var(--gray-light); }
.team:last-child { border-bottom:none; }
.team-top { display:flex; align-items:center; gap:5px; }

.ctry { font-size:8px; font-weight:800; color:#fff; border-radius:2px; padding:1px 4px; flex-shrink:0; min-width:28px; text-align:center; letter-spacing:0.5px; background:var(--bg2); }
.ctry.jpn { background:var(--teal-dark); }
#bracket-women .ctry.jpn { background:#7B2D8B; }

.pname { font-size:11px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.pname2 { font-size:11px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-left:33px; margin-top:1px; }

/* JPN highlight */
.team.jpn-team { background:var(--jpn); }
.team.jpn-team .ctry { background:var(--teal-dark); }
#bracket-women .team.jpn-team .ctry { background:#7B2D8B; }

.team.winner { background:linear-gradient(90deg,#FFFAED,#FFF8E7); }
.team.loser .pname, .team.loser .pname2 { color:var(--gray); }
.team.loser .ctry { background:#aaa; }
/* JPN badge stays colored even when loser, but faded */
.team.loser .ctry.jpn { background:rgba(26,140,133,0.45); }
#bracket-women .team.loser .ctry.jpn { background:rgba(123,45,139,0.45); }

/* TBD */
.tbd-row { flex:1; display:flex; flex-direction:column; justify-content:center; padding:3px 8px; border-bottom:1px solid var(--gray-light); }
.tbd-row:last-child { border-bottom:none; }
.tbd-inner { display:flex; align-items:center; gap:5px; }
.tbd-badge { font-size:8px; font-weight:700; color:#fff; background:#ccc; border-radius:2px; padding:1px 4px; flex-shrink:0; }
.tbd-text { font-size:11px; color:#bbb; }

/* SCORE DIVIDER */
.score-div { display:flex; align-items:center; justify-content:center; padding:1px 6px; background:#F5F7FA; border-top:1px solid var(--gray-light); border-bottom:1px solid var(--gray-light); gap:4px; flex-shrink:0; }
.sc-set { font-size:11px; font-weight:700; color:var(--text); }
.sc-pts { font-size:8px; color:var(--gray); }
#bracket-women .team.winner { background:linear-gradient(90deg,#FFF0FF,#FAE8FF); }

/* CONNECTOR */
.conn { width:24px; flex-shrink:0; position:relative; }
.conn svg { position:absolute; top:0; left:0; width:24px; overflow:visible; }

/* DATE DIVIDER */
.date-divider { width:2px; flex-shrink:0; margin:0 3px; position:relative; }
.date-divider::after { content:''; position:absolute; top:0; bottom:0; left:0; width:2px; border-left:2px dashed rgba(46,196,182,0.4); }
#bracket-women ~ .date-divider::after, .women-div::after { border-left-color: rgba(200,109,215,0.4); }

/* BRONZE */
.bronze-wrap { flex-shrink:0; display:flex; flex-direction:column; }
.bronze-label { font-family:'Barlow Condensed',cursive; font-size:12px; letter-spacing:3px; color:rgba(255,255,255,0.70); text-align:center; height:22px; line-height:12px; margin-bottom:4px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; text-transform:uppercase; font-weight:700; }
.bronze-date { font-family:'Barlow',sans-serif; font-size:11px; font-weight:600; color:#CD7F32; letter-spacing:1px; }
.bronze-slot { display:flex; flex-direction:column; justify-content:flex-start; }

/* CHAMPION */
.champ-wrap { flex-shrink:0; padding-left:10px; display:flex; flex-direction:column; }
.champ-card { background:linear-gradient(135deg,#C67E00,var(--gold-light),#C67E00); border-radius:8px; padding:14px 14px; width:150px; text-align:center; color:#fff; box-shadow:0 4px 20px rgba(240,165,0,0.35); }
.champ-trophy { font-size:28px; margin-bottom:4px; }
.champ-label { font-family:'Barlow Condensed',cursive; font-size:11px; letter-spacing:3px; opacity:0.85; margin-bottom:4px; text-transform:uppercase; }
.champ-p1 { font-size:12px; font-weight:700; line-height:1.3; }
#bracket-women .champ-card, .women-champ { background:linear-gradient(135deg,#5B1A6A,#C86DD7,#5B1A6A); box-shadow:0 4px 20px rgba(200,109,215,0.35); }

/* ===== WHITE BG + GREEN OVERRIDE ===== */
body { background:#F0F2F5 !important; background-image:none !important; }
.hd h1 { color:#111 !important; }
.hd-eye, .hd-sub { color:#333 !important; }
.hd h1 em { color:#333 !important; }
.hd-tag { background:#fff !important; border:1px solid #CCC !important; color:#222 !important; }
.hd-tag.jpn { background:rgba(46,196,182,0.1) !important; border-color:#1A8C85 !important; color:#1A8C85 !important; }
.toggle-btn { background:#fff !important; border:2px solid #CCC !important; color:#222 !important; }
.sub-tab { background:#fff !important; border:1.5px solid #CCC !important; color:#333 !important; }
.pool-card { background:#fff !important; border:1px solid #DDD !important; box-shadow:0 1px 4px rgba(0,0,0,0.08) !important; }
.pool-title { background:#2EC4B6 !important; color:#fff !important; border-bottom-color:#1A8C85 !important; }
.women-mode .pool-title { background:#9B3DAF !important; border-bottom-color:#7B2D8F !important; }
.pool-table th { color:#333 !important; background:#F8F8F8 !important; }
.pool-table td { color:#111 !important; }
.pool-table tr.advanced td { color:#111 !important; font-weight:600; }
.rank-cell { color:#333 !important; }
.match-result-row { display:flex; align-items:center; background:#FAFAFA !important; border:1px solid #EEE !important; border-radius:4px; padding:4px 8px; gap:5px; font-size:10px; margin-bottom:3px; }
.mr-date { font-size:9px; color:#333 !important; width:32px; flex-shrink:0; }
.mr-vs { font-size:9px; color:#555 !important; flex-shrink:0; }
.mr-score { font-size:9px; font-weight:600; color:#333 !important; flex-shrink:0; white-space:nowrap; }
.mr-team { flex:1; display:flex; align-items:center; gap:4px; }
.mr-team span.mr-name { color:#2E7D32 !important; font-weight:400; }
.mr-team.winner span.mr-name { color:#1B5E20 !important; font-weight:700; }
.mr-team.loser span.mr-name { color:#2E7D32 !important; font-weight:400; }
.match { border:1px solid #E0E0E0 !important; box-shadow:0 1px 6px rgba(0,0,0,0.1) !important; }
.match-info { background:#F0F8F8 !important; }
.women-mode .match-info { background:#F8F0FF !important; }
.match-info .mno { color:#1A8C85 !important; }
.women-mode .match-info .mno { color:#7B2D8F !important; }
.match-info .mtime { color:#111 !important; }
.match-info .mcourt { color:#333 !important; }
.match-info .mdot { color:#CCC !important; }
.pname { color:#2E7D32 !important; font-weight:400; }
.pname2 { color:#2E7D32 !important; font-weight:400; }
.team.winner .pname, .team.winner .pname2 { color:#1B5E20 !important; font-weight:700; }
.team.loser .pname, .team.loser .pname2 { color:#2E7D32 !important; font-weight:400; }
.team.winner { background:#F1F8E9 !important; }
.women-mode .team.winner { background:#F3E5F5 !important; }
.sc-set { color:#111 !important; font-weight:700; }
.sc-pts { color:#333 !important; }
.round-label { color:#222 !important; }
.date-sub { color:#1A8C85 !important; }
.bronze-label { color:#222 !important; }
.bronze-date { color:#1A8C85 !important; }
.ctry { background:#666 !important; color:#fff !important; }
.ctry.jpn { background:#1A8C85 !important; }
.women-mode .ctry.jpn { background:#7B2D8F !important; }
/* ===== END OVERRIDE ===== */
</style>
</head>

function addHour(t) {
  if(t==='TBD'||!t) return 'TBD';
  const [h,m] = t.split(':').map(Number);
  const jh = (h+1).toString().padStart(2,'0');
  return `${jh}:${m.toString().padStart(2,'0')}`;
}

function infoBar(no, timeLocal, court) {
  const jst = addHour(timeLocal);
  const timeStr = timeLocal && timeLocal!=='TBD'
    ? `<span class="mtime">${timeLocal}</span><span class="mdot">·</span><span class="mcourt">JST ${jst}</span><span class="mdot">·</span><span class="mcourt">${court}</span>`
    : `<span class="mcourt">Time TBD</span>`;
  return `<div class="match-info"><span class="mno">#${no}</span>${timeStr}</div>`;
}

function teamRow(TEAMS, key, result) {
  const t = TEAMS[key];
  if (!t) return tbdRow();
  const jpnCls = t.jpn ? ' jpn-team' : '';
  const resCls = result==='win'?' winner':result==='lose'?' loser':'';
  const ctryCls = t.jpn ? ' jpn' : '';
  return `<div class="team${jpnCls}${resCls}">
    <div class="team-top">
      <span class="ctry${ctryCls}">${t.ctry}</span>
      <span class="pname">${t.p1}</span>
    </div>
    <div class="pname2">${t.p2}</div>
  </div>`;
}

function tbdRow() {
  return `<div class="tbd-row"><div class="tbd-inner"><span class="tbd-badge">?</span><span class="tbd-text">TBD</span></div></div>`;
}

function scoreDiv(scoreStr) {
  if(!scoreStr) return '';
  const m = scoreStr.match(/^(\d+)-(\d+)\s*\(([^)]+)\)$/);
  if(!m) return '';
  return `<div class="score-div"><span class="sc-set">${m[1]}</span><span class="sc-pts">(${m[3]})</span><span class="sc-set">${m[2]}</span></div>`;
}

function r16Card(TEAMS, match) {
  const wA = match.winner===match.teamA?'win':match.winner?'lose':'';
  const wB = match.winner===match.teamB?'win':match.winner?'lose':'';
  const sc = match.score && match.winner ? scoreDiv(match.score) : '';
  return `<div class="match">
    ${infoBar(match.no, match.timeLocal, match.court)}
    ${teamRow(TEAMS, match.teamA, wA)}
    ${sc}
    ${teamRow(TEAMS, match.teamB, wB)}
  </div>`;
}

function qfCard(TEAMS, r16, qfInfo, idxA, idxB) {
  const wA = r16[idxA].winner;
  const wB = r16[idxB].winner;
  const bar = infoBar(qfInfo.no, qfInfo.timeLocal, qfInfo.court);
  const w = qfInfo.winner || null;
  const sc = qfInfo.score || null;
  const rA = w===wA?'win':w?'lose':'';
  const rB = w===wB?'win':w?'lose':'';
  const rowA = wA ? teamRow(TEAMS, wA, rA) : tbdRow();
  const rowB = wB ? teamRow(TEAMS, wB, rB) : tbdRow();
  const div = (sc && w) ? scoreDiv(sc) : '';
  return `<div class="match">${bar}${rowA}${div}${rowB}</div>`;
}

function sfCard(TEAMS, qf, sfInfo, idxA, idxB) {
  const wA = qf[idxA].winner;
  const wB = qf[idxB].winner;
  const bar = infoBar(sfInfo.no, sfInfo.timeLocal, sfInfo.court);
  const w = sfInfo.winner || null;
  const sc = sfInfo.score || null;
  const rA = w===wA?'win':w?'lose':'';
  const rB = w===wB?'win':w?'lose':'';
  const rowA = wA ? teamRow(TEAMS, wA, rA) : tbdRow();
  const rowB = wB ? teamRow(TEAMS, wB, rB) : tbdRow();
  const div = (sc && w) ? scoreDiv(sc) : '';
  return `<div class="match">${bar}${rowA}${div}${rowB}</div>`;
}

function finCard(TEAMS, finInfo) {
  const bar = infoBar(finInfo.no, finInfo.timeLocal, finInfo.court);
  const tA = finInfo.teamA, tB = finInfo.teamB;
  const w = finInfo.winner || null;
  const sc = finInfo.score || null;

  const rB = w===tB?'win':w?'lose':'';

  const rowB = tB ? teamRow(TEAMS, tB, rB) : tbdRow();

function bronzeCard(TEAMS, info3rd) {
  const bar = infoBar(info3rd.no, info3rd.timeLocal, info3rd.court);
  const tA = info3rd.teamA, tB = info3rd.teamB;
  const w = info3rd.winner || null;

  const rowB = tB ? teamRow(TEAMS, tB, rB) : tbdRow();
  const div = (sc && w) ? scoreDiv(sc) : '';
  return `<div class="match">${bar}${rowA}${div}${rowB}</div>`;

function champCard() {
  return `<div class="champ-wrap" id="champ">
    <div class="round-label" style="opacity:0">-</div>
    <div style="display:flex;align-items:center;padding-left:8px;" id="champ-inner">
      <div class="champ-card">
        <div class="champ-trophy">🏆</div>
        <div class="champ-label">Champion</div>
        <div class="champ-p1" id="champ-name-men" style="display:none;">Hodges / Hood</div>
      <div class="champ-p1" id="champ-name-women" style="display:none;">Clancy / Fejes</div>
      <div class="champ-p1" id="champ-name-display">TBD</div>
      </div>
    </div>
  </div>`;
}

function roundLabel(title, date) {
  return `<div class="round-label">${title}<br><span class="date-sub">${date}</span></div>`;
}

function conn(id) { return `<div class="conn" id="c${id}"><svg id="s${id}"></svg></div>`; }
function dateDivider(cls) { return `<div class="date-divider ${cls||''}"></div>`; }

function buildBracket(bracketId) {
  const isMen = bracketId === 'bracket-men';
  const TEAMS = isMen ? MEN_TEAMS : WOMEN_TEAMS;
  const R16   = isMen ? MEN_R16   : WOMEN_R16;
  const QF    = isMen ? MEN_QF    : WOMEN_QF;
  const SF    = isMen ? MEN_SF    : WOMEN_SF;
  const FIN   = isMen ? MEN_FIN   : WOMEN_FIN;
  const lineColor = isMen ? 'rgba(46,196,182,0.5)' : 'rgba(200,109,215,0.5)';
  const pid = isMen ? 'M' : 'W';

  // R16: 8 matches in order matching bracket
  // QF pairs: (R16[0],R16[1])→QF[0], (R16[2],R16[3])→QF[1], (R16[4],R16[5])→QF[2], (R16[6],R16[7])→QF[3]
  const r16Cards = R16.map(m => r16Card(TEAMS, m));
  const qfCards  = QF.map((q,i) => qfCard(TEAMS, R16, q, i*2, i*2+1));
  const sfCards  = SF.map((s,i) => sfCard(TEAMS, QF, s, i*2, i*2+1));
  const finCards = FIN.map(f => finCard(TEAMS, f));

  function round(cls, label, date, cards) {
    return `<div class="round ${cls}">${roundLabel(label, date)}${cards.map(c=>`<div class="slot">${c}</div>`).join('')}</div>`;
  }

  const dateR16 = '5 Jun (Local) / 6 Jun (JST)';
  const dateQF  = '6 Jun (Local) / 6 Jun (JST)';
  const dateSF  = '6 Jun (Local) / 6 Jun (JST)';
  const dateFin = '7 Jun (Local) / 7 Jun (JST)';

  const info3rd = isMen ? MEN_3RD : WOMEN_3RD;
  const bronze3Card = bronzeCard(TEAMS, info3rd);

  document.getElementById(bracketId).innerHTML =
    round('r16', 'Round of 16', dateR16, r16Cards) +
    dateDivider() + conn(pid+'rq') +
    round('qf', 'Quarterfinals', dateQF, qfCards) +
    conn(pid+'qs') +
    round('sf', 'Semifinals', dateSF, sfCards) +
    conn(pid+'sf') +
    `<div style="flex-shrink:0;display:flex;flex-direction:column;height:calc(var(--slot)*8 - var(--gap));justify-content:center;gap:12px;">` +
      round('fin', 'Final', dateFin, finCards) +
      `<div class="bronze-wrap">
        <div class="bronze-label">Bronze Medal Match<br><span class="bronze-date">${dateFin}</span></div>
        <div class="bronze-slot">${bronze3Card}</div>
      </div>` +
    `</div>` +
    champCard();

  // Draw connectors
  requestAnimationFrame(()=>requestAnimationFrame(()=>drawBracket(bracketId)));

  // Divider height
  const br = document.getElementById(bracketId);
  if(br) {
    setTimeout(()=>{
      const h = br.scrollHeight;
      br.querySelectorAll('.date-divider').forEach(d=>d.style.height=h+'px');
    }, 100);
  }
}

function drawBracket(bracketId) {
  const br = document.getElementById(bracketId);
  if(!br) return;
  const bRect = br.getBoundingClientRect();
  const totalH = br.scrollHeight;
  const isMen = bracketId==='bracket-men';
  const pid = isMen ? 'M' : 'W';
  const LINE = isMen ? 'rgba(46,196,182,0.5)' : 'rgba(200,109,215,0.5)';

  function centers(cls) {
    return Array.from(br.querySelectorAll(`.${cls} .match`)).map(el=>{
      const r=el.getBoundingClientRect();
      return r.top+r.height/2-bRect.top;
    });
  }

  function draw(svgId, connId, src, dst) {
    const connEl=document.getElementById(connId);
    const svg=document.getElementById(svgId);
    if(!connEl||!svg) return;
    const w=connEl.getBoundingClientRect().width;
    svg.setAttribute('width',w); svg.setAttribute('height',totalH);
    let out='';
    const xm=w/2, SW=1.5;
    for(let i=0;i<dst.length;i++){
      const y1=src[i*2],y2=src[i*2+1],yd=dst[i];
      out+=`<line x1="0" y1="${y1}" x2="${xm}" y2="${y1}" stroke="${LINE}" stroke-width="${SW}"/>`;
      out+=`<line x1="0" y1="${y2}" x2="${xm}" y2="${y2}" stroke="${LINE}" stroke-width="${SW}"/>`;
      out+=`<line x1="${xm}" y1="${y1}" x2="${xm}" y2="${y2}" stroke="${LINE}" stroke-width="${SW}"/>`;
      out+=`<line x1="${xm}" y1="${yd}" x2="${w}" y2="${yd}" stroke="${LINE}" stroke-width="${SW}"/>`;
    }
    svg.innerHTML=out;
  }

  const c_r16=centers('r16'), c_qf=centers('qf'), c_sf=centers('sf'), c_fin=centers('fin');
  draw(`s${pid}rq`,`c${pid}rq`,c_r16,c_qf);
  draw(`s${pid}qs`,`c${pid}qs`,c_qf,c_sf);
  draw(`s${pid}sf`,`c${pid}sf`,c_sf,c_fin);

  // Divider heights
  br.querySelectorAll('.date-divider').forEach(d=>d.style.height=totalH+50+'px');

  // Champ alignment
  const finEl=br.querySelector('.fin .match');
  const champInner=br.querySelector('#champ-inner');
  if(finEl&&champInner){
    const fr=finEl.getBoundingClientRect();
    const mid=fr.top+fr.height/2-bRect.top;
    const cc=champInner.querySelector('.champ-card');
    const ch=cc.getBoundingClientRect().height;
    champInner.style.paddingTop=(mid-ch/2)+'px';
    champInner.style.alignItems='flex-start';
  }
}

let currentTab = 'pool';

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['men','women'].forEach(g=>{
    document.getElementById(g+'-pool').classList.toggle('active', tab==='pool');
    document.getElementById(g+'-draw').classList.toggle('active', tab==='draw');
  });
  if(tab==='draw') {
    requestAnimationFrame(()=>requestAnimationFrame(()=>drawBracket('bracket-'+currentGender)));
  }
}

// Override switchGender to handle sub-tabs
const _origSwitch = switchGender;
function switchGender(g, btn) {
  currentGender = g;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+g).classList.add('active');
  btn.classList.add('active');
  document.getElementById('tag-gender').textContent = g==='men' ? "MEN'S" : "WOMEN'S";
  const champDisplay = document.getElementById('champ-name-display');
  if(champDisplay) champDisplay.textContent = g==='men' ? 'Hodges / Hood' : 'Clancy / Fejes';
  // women-mode class for CSS
  document.body.classList.toggle('women-mode', g==='women');
  if(currentTab==='draw') {
    requestAnimationFrame(()=>requestAnimationFrame(()=>drawBracket('bracket-'+g)));
  }
}

// ===== RENDER POOL PLAY =====
function ctryPill(ctry, jpn) {
  return `<span class="ctry-pill${jpn?' jpn':''}">${ctry}</span>`;
}

function renderPools(gender) {
  const POOLS = gender==='men' ? MEN_POOLS : WOMEN_POOLS;
  const container = document.getElementById(gender+'-pool');

  let html = `<div class="pools-grid">`;
  Object.entries(POOLS).forEach(([poolKey, pool]) => {
    html += `<div class="pool-card">
      <div class="pool-title">Pool ${poolKey}</div>
      <table class="pool-table">
        <thead><tr>
          <th></th><th style="text-align:left">Team</th>
          <th>MP</th><th>W</th><th>L</th><th>SW</th><th>SL</th>
        </tr></thead>
        <tbody>`;
    pool.teams.forEach(t => {
      const adv = t.adv ? `<span class="adv-badge">→ Main</span>` : '';
      html += `<tr class="${t.adv?'advanced':'eliminated'}">
        <td class="rank-cell">${t.rank}</td>
        <td class="team-cell">${ctryPill(t.ctry,t.jpn)}${t.name}${adv}</td>
        <td>${t.mp}</td><td>${t.mw}</td><td>${t.ml}</td>
        <td>${t.sw}</td><td>${t.sl}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    if(pool.matches.length > 0) {
      html += `<div class="match-result-list" style="padding:8px 10px 10px;display:flex;flex-direction:column;gap:3px;"><div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:#888;margin-bottom:5px;">MATCHES</div>`;
      pool.matches.forEach(m => {
        const wA = m.winner==='A', wB = m.winner==='B';
        html += `<div class="match-result-row">
          <span class="mr-date">${m.date}</span>
          <div class="mr-team ${wA?'winner':'loser'}">${ctryPill(m.ctryA, m.jpnA)}<span class="mr-name">${m.teamA}</span></div>
          <span class="mr-vs">vs</span>
          <div class="mr-team ${wB?'winner':'loser'}">${ctryPill(m.ctryB, m.jpnB)}<span class="mr-name">${m.teamB}</span></div>
          <span class="mr-score">${m.score}</span>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;

  container.innerHTML = html;
}

renderPools('men');
renderPools('women');
